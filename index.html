<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎮 Gaming Store</h1>
        <div class="header-actions">
            <input type="text" id="searchBox" placeholder="🔍 Search games..." class="search-box">
            
            <button id="cartBtn" class="cart-btn">🛒 Cart (<span id="cartCount">0</span>)</button>
        </div>
    </header>

    <div class="promo-banner">
        <h2>🎉 Special Offers! Get up to 50% OFF on selected games!</h2>
    </div>

    <main>
        <div id="gamesList" class="games-grid"></div>
    </main>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Shopping Cart</h2>
            <div id="cartItems"></div>
            <div class="cart-total">
                <h3>Total: $<span id="totalPrice">0.00</span></h3>
            </div>
            <div class="payment-section">
                <h3>Customer Details</h3>
                <input type="text" id="customerName" placeholder="Enter your name" required>
                <input type="tel" id="customerPhone" placeholder="Enter your phone number" required>
                <h3>Payment Method</h3>
                <select id="paymentMethod">
                    <option value="credit">Credit Card</option>
                    <option value="paypal">PayPal</option>
                    <option value="crypto">Cryptocurrency</option>
                </select>
                <button id="generateQR" class="btn-primary">Generate Bill & QR Code</button>
            </div>
            <div id="qrSection" class="qr-section"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
